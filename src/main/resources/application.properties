spring.application.name=murmur

spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/murmur}
spring.datasource.username=${POSTGRES_USERNAME:murmur_backend}
spring.datasource.password=${POSTGRES_PASSWORD:backend123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update